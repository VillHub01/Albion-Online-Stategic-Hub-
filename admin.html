<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Albion Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Login Screen -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center bg-indigo-900">
        <div class="bg-white p-8 rounded-lg shadow-xl max-w-md w-full mx-4">
            <h2 class="text-2xl font-bold text-center text-indigo-900 mb-6"><i class="fa-solid fa-lock mr-2"></i>Admin Login</h2>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700">Password Admin</label>
                <input type="password" id="admin-password" class="mt-1 block w-full p-2 border rounded-md focus:ring-indigo-500 focus:border-indigo-500" placeholder="Masukkan password...">
            </div>
            <button onclick="checkPassword()" class="w-full bg-indigo-600 text-white font-bold py-2 px-4 rounded hover:bg-indigo-700 transition">Masuk ke Dashboard</button>
            <p id="login-error" class="text-red-500 text-sm mt-2 text-center hidden">Password salah!</p>
        </div>
    </div>

    <!-- Main Dashboard Screen (Hidden by default) -->
    <div id="dashboard-screen" class="hidden min-h-screen flex flex-col">
        <header class="bg-indigo-800 text-white p-4 shadow-md flex justify-between items-center">
            <h1 class="text-xl font-bold"><i class="fa-solid fa-gauge mr-2"></i>Albion Hub Admin Dashboard</h1>
            <button onclick="logout()" class="text-sm bg-indigo-700 hover:bg-indigo-600 px-3 py-1 rounded">Keluar</button>
        </header>

        <main class="container mx-auto p-4 md:p-8 flex-grow max-w-4xl">
            <div class="bg-white rounded-lg shadow p-6 mb-6">
                <h2 class="text-lg font-bold text-indigo-900 mb-4 border-b pb-2"><i class="fa-solid fa-bullhorn mr-2"></i>1. Kelola Pengumuman (Patch Notes)</h2>
                <div class="space-y-3">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Judul Patch</label>
                        <input type="text" id="patch-title" class="mt-1 block w-full p-2 border rounded border-gray-300 shadow-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Deskripsi Ringkas</label>
                        <textarea id="patch-desc" rows="3" class="mt-1 block w-full p-2 border rounded border-gray-300 shadow-sm"></textarea>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6 mb-6">
                <h2 class="text-lg font-bold text-indigo-900 mb-4 border-b pb-2"><i class="fa-solid fa-calculator mr-2"></i>2. Pengaturan Kalkulator</h2>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Pajak Pasar Default (%)</label>
                    <input type="number" id="calc-tax" step="0.1" class="mt-1 block w-24 p-2 border rounded border-gray-300 shadow-sm">
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6 mb-6">
                <h2 class="text-lg font-bold text-indigo-900 mb-4 border-b pb-2"><i class="fa-solid fa-khanda mr-2"></i>3. Manajemen Konten Build</h2>
                
                <!-- PVP Form -->
                <div class="mb-6 p-4 bg-gray-50 rounded border">
                    <h3 class="font-bold text-indigo-700 mb-2">Build PVP (Solo Mists/Corrupted)</h3>
                    <div class="grid md:grid-cols-2 gap-4">
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase">Nama Senjata</label>
                            <input type="text" id="pvp-senjata-name" class="w-full p-2 border rounded text-sm mb-2">
                            <label class="text-xs font-bold text-gray-500 uppercase">Alasan Senjata</label>
                            <input type="text" id="pvp-senjata-reason" class="w-full p-2 border rounded text-sm">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase">Nama Kepala</label>
                            <input type="text" id="pvp-kepala-name" class="w-full p-2 border rounded text-sm mb-2">
                            <label class="text-xs font-bold text-gray-500 uppercase">Alasan Kepala</label>
                            <input type="text" id="pvp-kepala-reason" class="w-full p-2 border rounded text-sm">
                        </div>
                    </div>
                </div>

                <!-- PVE Form -->
                <div class="mb-6 p-4 bg-gray-50 rounded border">
                    <h3 class="font-bold text-indigo-700 mb-2">Build PVE (Fame Farming)</h3>
                    <div class="grid md:grid-cols-2 gap-4">
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase">Nama Senjata</label>
                            <input type="text" id="pve-senjata-name" class="w-full p-2 border rounded text-sm mb-2">
                            <label class="text-xs font-bold text-gray-500 uppercase">Alasan Senjata</label>
                            <input type="text" id="pve-senjata-reason" class="w-full p-2 border rounded text-sm">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase">Nama Kepala</label>
                            <input type="text" id="pve-kepala-name" class="w-full p-2 border rounded text-sm mb-2">
                            <label class="text-xs font-bold text-gray-500 uppercase">Alasan Kepala</label>
                            <input type="text" id="pve-kepala-reason" class="w-full p-2 border rounded text-sm">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action Button -->
            <div class="flex justify-end mb-12">
                <button onclick="generateAndDownloadJSON()" class="bg-green-600 text-white font-bold py-3 px-6 rounded-lg hover:bg-green-700 shadow flex items-center transition">
                    <i class="fa-solid fa-download mr-2"></i> Generate & Unduh data.json
                </button>
            </div>
        </main>
    </div>

    <script>
        let currentData = {};

        function checkPassword() {
            const pass = document.getElementById('admin-password').value;
            // GANTI PASSWORD DI SINI
            if(pass === 'admin123') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard-screen').classList.remove('hidden');
                loadCurrentData();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        function logout() {
            document.getElementById('admin-password').value = '';
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('dashboard-screen').classList.add('hidden');
        }

        // Mengambil data dari data.json yang ada di GitHub untuk dimasukkan ke form input
        function loadCurrentData() {
            fetch('data.json')
                .then(response => response.json())
                .then(data => {
                    currentData = data;
                    // Set Form Pengumuman
                    document.getElementById('patch-title').value = data.patch_notes.title;
                    document.getElementById('patch-desc').value = data.patch_notes.description;
                    // Set Form Kalkulator
                    document.getElementById('calc-tax').value = data.calculator_settings.default_market_tax;
                    // Set Form Build (Contoh sebagian, bisa ditambahkan manual untuk slot dada/kaki)
                    document.getElementById('pvp-senjata-name').value = data.builds.pvp.senjata_name;
                    document.getElementById('pvp-senjata-reason').value = data.builds.pvp.senjata_reason;
                    document.getElementById('pvp-kepala-name').value = data.builds.pvp.kepala_name;
                    document.getElementById('pvp-kepala-reason').value = data.builds.pvp.kepala_reason;

                    document.getElementById('pve-senjata-name').value = data.builds.pve.senjata_name;
                    document.getElementById('pve-senjata-reason').value = data.builds.pve.senjata_reason;
                    document.getElementById('pve-kepala-name').value = data.builds.pve.kepala_name;
                    document.getElementById('pve-kepala-reason').value = data.builds.pve.kepala_reason;
                })
                .catch(err => console.error("Gagal memuat data.json bawaan:", err));
        }

        // Menyusun kembali inputan menjadi file JSON baru lalu mengunduhnya
        function generateAndDownloadJSON() {
            currentData.patch_notes.title = document.getElementById('patch-title').value;
            currentData.patch_notes.description = document.getElementById('patch-desc').value;
            currentData.calculator_settings.default_market_tax = parseFloat(document.getElementById('calc-tax').value);
            
            currentData.builds.pvp.senjata_name = document.getElementById('pvp-senjata-name').value;
            currentData.builds.pvp.senjata_reason = document.getElementById('pvp-senjata-reason').value;
            currentData.builds.pvp.kepala_name = document.getElementById('pvp-kepala-name').value;
            currentData.builds.pvp.kepala_reason = document.getElementById('pvp-kepala-reason').value;

            currentData.builds.pve.senjata_name = document.getElementById('pve-senjata-name').value;
            currentData.builds.pve.senjata_reason = document.getElementById('pve-senjata-reason').value;
            currentData.builds.pve.kepala_name = document.getElementById('pve-kepala-name').value;
            currentData.builds.pve.kepala_reason = document.getElementById('pve-kepala-reason').value;

            // Proses Download otomatis ke komputer/HP
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(currentData, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "data.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }
    </script>
</body>
</html>
